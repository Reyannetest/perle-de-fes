<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Administration — Perle de Fès</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- ========== ECRAN DE CONNEXION ========== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-ornament">
                <svg viewBox="0 0 200 30">
                    <path d="M0,15 Q25,0 50,15 T100,15 T150,15 T200,15" stroke="currentColor" fill="none" stroke-width="1"/>
                    <circle cx="100" cy="15" r="4" fill="currentColor"/>
                    <circle cx="50" cy="15" r="2" fill="currentColor"/>
                    <circle cx="150" cy="15" r="2" fill="currentColor"/>
                </svg>
            </div>
            <h1 class="login-title">Perle de Fès</h1>
            <p class="login-subtitle">Espace Administration</p>
            <button class="btn btn-primary login-btn" id="loginBtn">Se connecter</button>
            <div class="login-ornament">
                <svg viewBox="0 0 200 30">
                    <path d="M0,15 Q25,30 50,15 T100,15 T150,15 T200,15" stroke="currentColor" fill="none" stroke-width="1"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- ========== ADMIN PRINCIPAL ========== -->
    <div class="admin" id="adminPanel" style="display:none;">

        <!-- Header -->
        <header class="admin-header">
            <div class="admin-header__left">
                <h1 class="admin-header__title">Perle de Fès</h1>
                <span class="admin-header__badge">Admin</span>
            </div>
            <div class="admin-header__right">
                <a href="/" target="_blank" class="btn btn-outline btn-sm">Voir le site</a>
                <button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button>
            </div>
        </header>

        <!-- Navigation onglets -->
        <nav class="admin-tabs">
            <button class="tab active" data-tab="products">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                    <path d="M20 12V22H4V12M22 7H2V12H22V7ZM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/>
                </svg>
                Produits
            </button>
            <button class="tab" data-tab="texts">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Textes du site
            </button>
            <button class="tab" data-tab="contact">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
                    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                </svg>
                Contact & Infos
            </button>
        </nav>

        <!-- ========== ONGLET PRODUITS ========== -->
        <section class="tab-content active" id="tab-products">
            <div class="section-header">
                <h2>Vos Produits</h2>
                <button class="btn btn-primary" id="addProductBtn">+ Ajouter un produit</button>
            </div>
            <div class="products-list" id="productsList">
                <!-- Rempli dynamiquement -->
            </div>
        </section>

        <!-- ========== ONGLET TEXTES ========== -->
        <section class="tab-content" id="tab-texts">
            <div class="section-header">
                <h2>Textes du site</h2>
                <button class="btn btn-primary" id="saveTextsBtn">Enregistrer</button>
            </div>

            <div class="form-sections" id="textsForm">
                <!-- Rempli dynamiquement -->
            </div>
        </section>

        <!-- ========== ONGLET CONTACT ========== -->
        <section class="tab-content" id="tab-contact">
            <div class="section-header">
                <h2>Contact & Informations</h2>
                <button class="btn btn-primary" id="saveContactBtn">Enregistrer</button>
            </div>

            <div class="form-sections" id="contactForm">
                <!-- Rempli dynamiquement -->
            </div>
        </section>

        <!-- ========== MODALE EDITION PRODUIT ========== -->
        <div class="modal-overlay" id="productModal" style="display:none;">
            <div class="modal-panel">
                <div class="modal-panel__header">
                    <h3 id="modalProductTitle">Modifier le produit</h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-panel__body">
                    <div class="form-group">
                        <label>Photo du produit</label>
                        <div class="image-upload" id="imageUpload">
                            <img src="" alt="" class="image-preview" id="imagePreview" style="display:none;">
                            <div class="image-placeholder" id="imagePlaceholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                                <span>Cliquer pour choisir une image</span>
                            </div>
                            <input type="file" accept="image/*" id="imageInput" style="display:none;">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="editTitle">Nom du produit</label>
                            <input type="text" id="editTitle" placeholder="Ex: Panier Mini Hammam">
                        </div>
                        <div class="form-group">
                            <label for="editPrice">Prix</label>
                            <input type="text" id="editPrice" placeholder="Ex: 11€">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="editBadge">Badge</label>
                            <input type="text" id="editBadge" placeholder="Ex: Idéal cadeau Henna Day">
                        </div>
                        <div class="form-group">
                            <label for="editDelay">Délai</label>
                            <input type="text" id="editDelay" placeholder="Ex: Délai : 2 semaines maximum">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="editOrder">Ordre d'affichage</label>
                        <input type="number" id="editOrder" min="1" placeholder="1">
                    </div>

                    <div class="form-group">
                        <label>Composition</label>
                        <div class="composition-list" id="compositionList">
                            <!-- Rempli dynamiquement -->
                        </div>
                        <button class="btn btn-outline btn-sm" id="addCompositionBtn">+ Ajouter un élément</button>
                    </div>

                    <div class="form-group">
                        <label for="editWhatsapp">Message WhatsApp</label>
                        <input type="text" id="editWhatsapp" placeholder="Message pré-rempli pour WhatsApp">
                    </div>
                </div>

                <div class="modal-panel__footer">
                    <button class="btn btn-ghost" id="modalCancel">Annuler</button>
                    <button class="btn btn-primary" id="modalSave">Enregistrer</button>
                </div>
            </div>
        </div>

        <!-- Toast notification -->
        <div class="toast" id="toast">
            <span class="toast-icon">&#10003;</span>
            <span class="toast-text" id="toastText">Modifications enregistrées !</span>
        </div>

        <!-- Loader -->
        <div class="loader-overlay" id="loader" style="display:none;">
            <div class="loader-spinner"></div>
            <p>Enregistrement en cours...</p>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
