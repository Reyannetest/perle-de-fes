backend:
  name: git-gateway
  branch: main

locale: "fr"

media_folder: "images"
public_folder: "/images"

collections:
  # ============================================
  # CONTENU DU SITE (fichiers uniques)
  # ============================================
  - name: "settings"
    label: "Contenu du site"
    files:
      # --- PRODUITS ---
      - name: "products"
        label: "Produits"
        file: "data/products.json"
        fields:
          - label: "Produits"
            name: "items"
            widget: "list"
            label_singular: "Produit"
            summary: "{{fields.title}} — {{fields.price}}"
            fields:
              - label: "Nom du produit"
                name: "title"
                widget: "string"
                hint: "Ex: Panier Mini Hammam"

              - label: "Prix"
                name: "price"
                widget: "string"
                hint: "Ex: 11€ ou À partir de 1,50€/pièce"

              - label: "Badge"
                name: "badge"
                widget: "string"
                hint: "Petit texte sur la carte. Ex: Idéal cadeau Henna Day"

              - label: "Délai"
                name: "delay"
                widget: "string"
                hint: "Ex: Délai : 2 semaines maximum"

              - label: "Photo du produit"
                name: "image"
                widget: "image"
                hint: "Format recommandé : 600x500px"

              - label: "Ordre d'affichage"
                name: "order"
                widget: "number"
                value_type: "int"
                min: 1
                hint: "1 = premier affiché, 2 = deuxième, etc."

              - label: "Composition"
                name: "composition"
                widget: "list"
                hint: "Liste des éléments inclus dans le produit"
                field:
                  label: "Élément"
                  name: "item"
                  widget: "string"

              - label: "Message WhatsApp"
                name: "whatsappMessage"
                widget: "string"
                hint: "Message pré-rempli quand le client clique sur Commander"

      # --- TEXTES DU SITE ---
      - name: "site-content"
        label: "Textes du site"
        file: "data/site-content.json"
        fields:
          - label: "Section Accueil (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Titre principal", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "string" }
              - { label: "Phrase d'accroche", name: "tagline", widget: "text" }
              - { label: "Texte du bouton", name: "cta", widget: "string" }

          - label: "Section Présentation"
            name: "presentation"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte de présentation", name: "text", widget: "text" }
              - label: "3 points forts"
                name: "features"
                widget: "list"
                max: 3
                min: 3
                field:
                  label: "Point fort"
                  name: "feature"
                  widget: "string"

          - label: "Section Produits (en-tête)"
            name: "products"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "text" }

          - label: "Section Devis"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "string" }
              - { label: "Message de confirmation", name: "successMessage", widget: "text" }

          - label: "Section Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "text" }
              - { label: "Numéro WhatsApp affiché", name: "whatsapp", widget: "string", hint: "Ex: 06 52 37 55 78" }
              - { label: "Numéro WhatsApp (international, sans +)", name: "whatsappNumber", widget: "string", hint: "Ex: 33652375578" }
              - { label: "Instagram", name: "instagram", widget: "string", hint: "Ex: @perledefes.creation" }
              - { label: "URL Instagram", name: "instagramUrl", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - label: "Infos livraison"
                name: "deliveryInfo"
                widget: "list"
                field:
                  label: "Ligne"
                  name: "line"
                  widget: "string"

          - label: "Pied de page"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Nom de la marque", name: "brand", widget: "string" }
              - { label: "Slogan", name: "tagline", widget: "string" }
              - { label: "Copyright", name: "copyright", widget: "string" }
